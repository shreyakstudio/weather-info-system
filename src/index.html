<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Information System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🌤️ Weather Information System</h1>
        
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name..." />
            <button onclick="getWeather()">Search</button>
        </div>

        <div id="error-message" class="error hidden"></div>

        <div id="weather-card" class="weather-card hidden">
            <h2 id="city-name"></h2>
            <img id="weather-icon" src="" alt="weather icon"/>
            <p id="description"></p>

            <div class="stats-grid">
                <div class="stat-box">
                    <span class="stat-icon">🌡️</span>
                    <span class="stat-label">Temperature</span>
                    <span class="stat-value" id="temperature"></span>
                </div>
                <div class="stat-box">
                    <span class="stat-icon">🤔</span>
                    <span class="stat-label">Feels Like</span>
                    <span class="stat-value" id="feels-like"></span>
                </div>
                <div class="stat-box">
                    <span class="stat-icon">💧</span>
                    <span class="stat-label">Humidity</span>
                    <span class="stat-value" id="humidity"></span>
                </div>
                <div class="stat-box">
                    <span class="stat-icon">💨</span>
                    <span class="stat-label">Wind Speed</span>
                    <span class="stat-value" id="wind-speed"></span>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
